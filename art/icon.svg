<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- AmbientControl launcher icon: phone with AOD clock line and charger plug -->
  <rect width="512" height="512" fill="#0E1116"/>

  <!-- Phone -->
  <rect x="156" y="96" width="200" height="320" rx="36"
        fill="none" stroke="#E6EDF3" stroke-width="20"/>

  <!-- Clock line on the always-on display -->
  <line x1="216" y1="180" x2="296" y2="180"
        stroke="#E6EDF3" stroke-width="20" stroke-linecap="round"/>

  <!-- Charger plug -->
  <g stroke="#58A6FF" stroke-width="16" fill="none" stroke-linecap="round">
    <line x1="236" y1="232" x2="236" y2="262"/>
    <line x1="276" y1="232" x2="276" y2="262"/>
    <rect x="216" y="262" width="80" height="60" rx="16"/>
    <line x1="256" y1="322" x2="256" y2="356"/>
  </g>
</svg>
